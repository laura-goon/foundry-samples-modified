# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: foundry-memory-rag
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
      - name: text-embedding-3-small
        model:
          format: OpenAI
          name: text-embedding-3-small
          version: '1'
        sku:
          name: GlobalStandard
          capacity: 10
  foundry-memory-rag:
    host: azure.ai.agent
    metadata:
      tags:
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - Agent Framework
        - Foundry Memory
        - RAG
    project: src/foundry-memory-rag
    language: csharp
    codeConfiguration:
      runtime: dotnet_10
      entryPoint: foundry-memory-rag.dll
    uses:
      - ai-project
    kind: hosted
    name: foundry-memory-rag
    displayName: Foundry Memory RAG Agent
    description: A personal coach agent that remembers your training goals, preferences, and constraints across sessions. Uses FoundryMemoryProvider for per-user-private memory grounded in a Foundry Memory store.
    protocols:
      - protocol: responses
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
      - name: AZURE_AI_EMBEDDING_DEPLOYMENT_NAME
        value: ${AZURE_AI_EMBEDDING_DEPLOYMENT_NAME}
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

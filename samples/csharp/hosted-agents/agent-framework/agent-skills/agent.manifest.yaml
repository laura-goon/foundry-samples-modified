# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: agent-skills
displayName: "Agent Skills"

description: >
  Agent Framework agent that downloads its behavioral guidelines from the Foundry
  Skills REST API at startup, demonstrating how to decouple guidelines (tone,
  escalation policy, etc.) from agent code using AgentSkillsProvider with
  progressive disclosure.

metadata:
  tags:
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Agent Framework
    - Agent Skills
    - Foundry Skills

template:
  name: agent-skills
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  resources:
    cpu: "0.25"
    memory: 0.5Gi
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING are injected
    # by the platform (hosted) and translated by azd (local) - do NOT declare them here.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: SKILL_NAMES
      value: "{{SKILL_NAMES}}"

parameters:
  properties:
    - name: SKILL_NAMES
      secret: false
      description: >
        Comma-separated list of Foundry skill names to download at startup
        (for example support-style,escalation-policy). The named skills must
        already exist in the target Foundry project.

resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: simple-agent
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
  simple-agent:
    host: azure.ai.agent
    metadata:
      tags:
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - Agent Framework
    project: src/simple-agent
    language: csharp
    codeConfiguration:
      runtime: dotnet_10
      entryPoint: simple-agent.dll
    uses:
      - ai-project
    kind: hosted
    name: simple-agent
    displayName: Simple Agent
    description: A simple general-purpose AI assistant hosted as a Foundry Hosted Agent using the Agent Framework.
    protocols:
      - protocol: responses
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: agent-framework-a2a-executor-responses-dotnet
displayName: "A2A Executor — Math Expert (.NET, Agent Framework)"
description: >
  An Agent Framework hosted agent (Responses protocol) that answers arithmetic /
  math questions. Once deployed, run `scripts/setup-a2a.{sh,ps1}` to turn on
  incoming A2A so other Foundry agents can reach it through Foundry's A2A
  endpoint.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - A2A
    - .NET
template:
  name: agent-framework-a2a-executor-responses-dotnet
  kind: hosted
  protocols:
    - protocol: responses
      version: 2.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING
    # are injected by the platform (hosted) and translated by azd (local)
    # — do NOT declare them here.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

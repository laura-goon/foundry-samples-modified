# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: agent-framework-a2a-executor-responses-dotnet
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
  agent-framework-a2a-executor-responses-dotnet:
    host: azure.ai.agent
    metadata:
      tags:
        - Agent Framework
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - A2A
        - .NET
    project: src/agent-framework-a2a-executor-responses-dotnet
    language: csharp
    codeConfiguration:
      runtime: dotnet_10
      entryPoint: executor.dll
    uses:
      - ai-project
    kind: hosted
    name: agent-framework-a2a-executor-responses-dotnet
    displayName: A2A Executor — Math Expert (.NET, Agent Framework)
    description: An Agent Framework hosted agent (Responses protocol) that answers arithmetic / math questions. Once deployed, run `scripts/setup-a2a.{sh,ps1}` to turn on incoming A2A so other Foundry agents can reach it through Foundry's A2A endpoint.
    protocols:
      - protocol: responses
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

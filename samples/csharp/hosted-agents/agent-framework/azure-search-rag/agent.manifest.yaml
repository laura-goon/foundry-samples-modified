# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: azure-search-rag
displayName: "Azure AI Search RAG Agent"

description: >
  A support specialist agent with Retrieval Augmented Generation (RAG) backed by Azure AI Search.
  Uses TextSearchProvider over a real SearchClient to ground answers in Contoso Outdoors product
  documentation indexed in Azure AI Search.

metadata:
  tags:
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Agent Framework
    - RAG
    - Azure AI Search

template:
  name: azure-search-rag
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  resources:
    cpu: "0.25"
    memory: 0.5Gi
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: AZURE_SEARCH_ENDPOINT
      value: "https://${AZURE_AI_SEARCH_SERVICE_NAME}.search.windows.net"
    - name: AZURE_SEARCH_INDEX_NAME
      value: "contoso-outdoors"
parameters:
  properties: []
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: tool
    id: azure_ai_search
    name: search

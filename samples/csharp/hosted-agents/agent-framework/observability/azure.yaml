# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: observability
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
  observability:
    host: azure.ai.agent
    metadata:
      tags:
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - Agent Framework
        - Observability
        - OpenTelemetry
    project: src/observability
    language: csharp
    codeConfiguration:
      runtime: dotnet_10
      entryPoint: observability.dll
    uses:
      - ai-project
    kind: hosted
    name: observability
    displayName: Observability Agent
    description: An instrumented Agent Framework agent demonstrating Foundry hosted-agent observability with traces for agent invocation, model chat, and tool execution.
    protocols:
      - protocol: responses
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
      - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
        value: 'true'
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

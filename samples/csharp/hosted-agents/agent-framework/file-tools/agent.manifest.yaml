# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml

name: file-tools
displayName: "File Tools Agent"

description: >
  A hosted agent that answers questions over two file knowledge sources: image-bundled
  reference files and per-session uploaded files. Demonstrates security-scoped tool
  pairs (one tool per source, no path-typed parameters).

metadata:
  tags:
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Agent Framework
    - File Tools

template:
  name: file-tools
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  resources:
    cpu: "0.25"
    memory: 0.5Gi
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"

parameters:
  properties: []

resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: foundry-toolbox-server-side-dotnet-agent-framework
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
  agent-tools:
    host: azure.ai.toolbox
    uses:
      - ai-project
    tools:
      - type: web_search
        name: web_search
      - type: code_interpreter
        name: code_interpreter
  foundry-toolbox-server-side-dotnet-agent-framework:
    host: azure.ai.agent
    metadata:
      tags:
        - AI Agent Hosting
        - Responses Protocol
        - Agent Framework
        - Toolbox
        - MCP
        - Server-Side Tools
        - .NET
    project: src/foundry-toolbox-server-side-dotnet-agent-framework
    language: csharp
    codeConfiguration:
      runtime: dotnet_10
      entryPoint: foundry-toolbox-server-side.dll
    uses:
      - ai-project
      - agent-tools
    kind: hosted
    name: foundry-toolbox-server-side-dotnet-agent-framework
    displayName: Foundry Toolbox — Server-Side Tools (.NET, Agent Framework)
    description: Agent Framework agent that consumes a Foundry Toolbox as server-side tools. The hosting layer connects to the toolbox's managed MCP proxy at startup and injects its tools into every request, and the Foundry platform executes the tool calls.
    protocols:
      - protocol: responses
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
      - name: TOOLBOX_NAME
        value: ${TOOLBOX_NAME}
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

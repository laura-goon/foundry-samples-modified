# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: foundry-toolbox-server-side-dotnet-agent-framework
displayName: "Foundry Toolbox — Server-Side Tools (.NET, Agent Framework)"
description: >
  Agent Framework agent that consumes a Foundry Toolbox as server-side tools. The
  hosting layer connects to the toolbox's managed MCP proxy at startup and injects its
  tools into every request, and the Foundry platform executes the tool calls.
metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - Agent Framework
    - Toolbox
    - MCP
    - Server-Side Tools
    - .NET
template:
  name: foundry-toolbox-server-side-dotnet-agent-framework
  kind: hosted
  protocols:
    - protocol: responses
      version: 2.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING
    # are injected by the platform (hosted) and translated by azd (local)
    # — do NOT declare them here.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_NAME
      value: "agent-tools"
resources:
  - kind: model
    id: gpt-4.1
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: toolbox
    name: agent-tools
    tools:
      - type: web_search
        name: web_search
      - type: code_interpreter
        name: code_interpreter

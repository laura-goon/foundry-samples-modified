# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
kind: hosted
name: env-vars-agent-dotnet-responses
description: |
    A hosted agent that returns environment variables injected by Foundry's
    connection-templated secret resolver. Demonstrates all four corners of
    the connection grid (ApiKey x CustomKeys, secret x non-secret) and a
    kind-aware safety policy in the agent: metadata and target values are
    returned verbatim; credentials are returned only as a safe fingerprint.
metadata:
    tags:
        - AI Agent Hosting
        - Responses Protocol
        - Bring Your Own
        - Function Calling
        - Connection Resolution
        - .NET
protocols:
    - protocol: responses
      version: 2.0.0
resources:
    cpu: "0.25"
    memory: 0.5Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5.4-mini
    # ────────────────────────────────────────────────────────────────────
    # Four example env vars demonstrating both connection types x both
    # kinds (ApiKey x CustomKeys, secret x non-secret). The values below
    # use placeholder/dummy connection names — replace `dummy-api-key`,
    # `dummy-custom-keys`, `secret-key`, and `plain-key` with the real
    # names from your project before deploying.
    #
    # When deploying with `azd deploy`, env vars are read from
    # `agent.manifest.yaml`, not from this file — keep the two in sync.
    #
    #   ApiKey connection 'dummy-api-key'        -> credentials.key   + target
    #   CustomKeys connection 'dummy-custom-keys' -> credentials.<key> + metadata.<key>
    - name: SECRET_API_KEY
      value: ${{connections.dummy-api-key.credentials.key}}
    - name: TARGET
      value: ${{connections.dummy-api-key.target}}
    - name: SECRET_KEY
      value: ${{connections.dummy-custom-keys.credentials.secret-key}}
    - name: NON_SECRET_KEY
      value: ${{connections.dummy-custom-keys.metadata.plain-key}}

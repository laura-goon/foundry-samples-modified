# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: browser-automation-csharp-byo
displayName: "Browser Automation Agent (C#, BYO Responses)"
description: >
  A Foundry-hosted browser automation agent using the Responses protocol with
  playwright-cli and Toolbox MCP. Supports multi-session browsing, web scraping,
  and form filling.
metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - Bring Your Own
    - Browser Automation
    - .NET
template:
  name: browser-automation-csharp-byo
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING
    # are injected by the platform (hosted) and translated by azd (local)
    # — do NOT declare them here.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_NAME
      value: "browser-automation-tools"
parameters:
  PLAYWRIGHT_SERVICE_URL:
    secret: false
    description: Browser WebSocket endpoint for the Azure Playwright workspace.
  PLAYWRIGHT_SERVICE_RESOURCE_ID:
    secret: false
    description: Azure resource ID of the Playwright workspace.
  PLAYWRIGHT_SERVICE_ACCESS_TOKEN:
    secret: true
    description: Access token for the Azure Playwright workspace.
resources:
  - kind: model
    id: gpt-4.1
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: connection
    name: browserautomation
    authType: ApiKey
    category: PlaywrightWorkspace
    target: "{{PLAYWRIGHT_SERVICE_URL}}"
    credentials:
      key: "{{PLAYWRIGHT_SERVICE_ACCESS_TOKEN}}"
    metadata:
      resourceId: "{{PLAYWRIGHT_SERVICE_RESOURCE_ID}}"
  - kind: toolbox
    name: browser-automation-tools
    tools:
      - type: browser_automation_preview
        browser_automation_preview:
          connection:
            project_connection_id: browserautomation

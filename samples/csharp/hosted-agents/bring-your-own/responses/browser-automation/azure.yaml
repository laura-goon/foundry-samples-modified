# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: browser-automation-csharp-byo
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
  browserautomation:
    host: azure.ai.connection
    uses:
      - ai-project
    category: PlaywrightWorkspace
    target: '${PLAYWRIGHT_SERVICE_URL}'
    authType: ApiKey
    credentials:
      key: '${PLAYWRIGHT_SERVICE_ACCESS_TOKEN}'
    metadata:
      resourceId: '${PLAYWRIGHT_SERVICE_RESOURCE_ID}'
  browser-automation-tools:
    host: azure.ai.toolbox
    uses:
      - ai-project
      - browserautomation
    tools:
      - type: browser_automation_preview
        browser_automation_preview:
          connection:
            project_connection_id: '${AZURE_AI_PROJECT_ID}/connections/browserautomation'
  browser-automation-csharp-byo:
    host: azure.ai.agent
    metadata:
      tags:
        - AI Agent Hosting
        - Responses Protocol
        - Bring Your Own
        - Browser Automation
        - .NET
    project: src/browser-automation-csharp-byo
    language: csharp
    codeConfiguration:
      runtime: dotnet_10
      entryPoint: browser-automation.dll
    uses:
      - ai-project
      - browserautomation
      - browser-automation-tools
    kind: hosted
    name: browser-automation-csharp-byo
    displayName: Browser Automation Agent (C#, BYO Responses)
    description: A Foundry-hosted browser automation agent (C#, BYO Responses) for general browsing, web scraping, and form filling.
    protocols:
      - protocol: responses
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
      - name: TOOLBOX_NAME
        value: ${TOOLBOX_NAME}
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

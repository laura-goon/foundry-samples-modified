# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: notetaking-agent-dotnet-invocations
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
  notetaking-agent-dotnet-invocations:
    host: azure.ai.agent
    metadata:
      tags:
        - AI Agent Hosting
        - Invocations Protocol
        - Bring Your Own
        - Function Calling
        - Note Taking
        - .NET
    project: src/notetaking-agent-dotnet-invocations
    language: csharp
    codeConfiguration:
      runtime: dotnet_10
      entryPoint: notetaking-agent.dll
    uses:
      - ai-project
    kind: hosted
    name: notetaking-agent-dotnet-invocations
    displayName: Notetaking Agent (.NET, Invocations)
    description: A note-taking agent using the Invocations protocol with Azure OpenAI function calling in C#. Demonstrates tool use (save_note, get_notes) with per-session JSONL persistence and SSE streaming.
    protocols:
      - protocol: invocations
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

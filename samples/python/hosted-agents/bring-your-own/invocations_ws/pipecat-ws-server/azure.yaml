# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: pipecat-ws-server
services:
  ai-project:
    host: azure.ai.project
  pipecat-ws-server:
    host: azure.ai.agent
    metadata:
      tags:
        - AI Agent Hosting
        - WebSocket Protocol
        - Bring Your Own
    project: src/pipecat-ws-server
    language: python
    codeConfiguration:
      runtime: python_3_13
      entryPoint: server.py
    uses:
      - ai-project
    kind: hosted
    name: pipecat-ws-server
    displayName: Pipecat WebSocket Server
    description: Pipecat-based WebSocket agent. Accepts WebSocket connections and processes audio/text frames using the Pipecat framework. Useful for testing the websocket protocol end-to-end (e.g., Voice Live integration).
    protocols:
      - protocol: invocations_ws
        version: 2.0.0
    environmentVariables:
      - name: AZURE_SPEECH_API_KEY
        value: ${AZURE_SPEECH_API_KEY}
      - name: AZURE_SPEECH_REGION
        value: ${AZURE_SPEECH_REGION}
      - name: AZURE_FOUNDRY_API_KEY
        value: ${AZURE_FOUNDRY_API_KEY}
      - name: AZURE_OPENAI_ENDPOINT
        value: ${AZURE_OPENAI_ENDPOINT}
      - name: AZURE_LLM_MODEL
        value: ${AZURE_LLM_MODEL}
    container:
      resources:
        cpu: '2'
        memory: 4Gi
infra:
  provider: microsoft.foundry

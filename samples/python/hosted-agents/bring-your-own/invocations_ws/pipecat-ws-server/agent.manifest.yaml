# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: pipecat-ws-server
displayName: "Pipecat WebSocket Server"
description: >
  Pipecat-based WebSocket agent. Accepts WebSocket connections and processes
  audio/text frames using the Pipecat framework. Useful for testing the
  websocket protocol end-to-end (e.g., Voice Live integration).
metadata:
  tags:
    - AI Agent Hosting
    - WebSocket Protocol
    - Bring Your Own
template:
  name: pipecat-ws-server
  kind: hosted
  protocols:
    - protocol: invocations_ws
      version: 1.0.0

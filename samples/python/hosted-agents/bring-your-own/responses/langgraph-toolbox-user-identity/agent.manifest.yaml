name: toolbox-langgraph-user-identity
displayName: "LangGraph Toolbox User Identity Agent"
description: >
  LangGraph ReAct agent wired to a Microsoft Foundry toolbox with user-identity
  and OAuth-protected MCP tools. Includes WorkIQ mail, WorkIQ calendar,
  and GitHub MCP connections.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
    - Toolbox
    - MCP
    - OAuth2
    - User Identity
    - Microsoft Foundry
template:
  name: toolbox-langgraph-user-identity
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_NAME
      value: "langgraph-toolbox-user-identity-tools"
resources:
  - kind: model
    id: gpt-4.1
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: connection
    name: workiq-mail-conn
    category: RemoteTool
    authType: UserEntraToken
    audience: ea9ffc3e-8a23-4a7d-836d-234d7c7565c1
    target: https://agent365.svc.cloud.microsoft/agents/servers/mcp_MailTools
  - kind: connection
    name: workiq-calendar-conn
    category: RemoteTool
    authType: UserEntraToken
    audience: ea9ffc3e-8a23-4a7d-836d-234d7c7565c1
    target: https://agent365.svc.cloud.microsoft/agents/servers/mcp_CalendarTools
  - kind: connection
    name: github-oauth-conn
    category: RemoteTool
    authType: OAuth2
    target: https://api.githubcopilot.com/mcp
    managedConnector: foundrygithubmcp
    credentials:
      type: OAuth2
  - kind: toolbox
    name: langgraph-toolbox-user-identity-tools
    tools:
      - type: mcp
        server_label: workiq-mail
        project_connection_id: workiq-mail-conn
        server_url: https://agent365.svc.cloud.microsoft/agents/servers/mcp_MailTools
      - type: mcp
        server_label: workiq-calendar
        project_connection_id: workiq-calendar-conn
        server_url: https://agent365.svc.cloud.microsoft/agents/servers/mcp_CalendarTools
      - type: mcp
        server_label: github
        project_connection_id: github-oauth-conn
        server_url: https://api.githubcopilot.com/mcp

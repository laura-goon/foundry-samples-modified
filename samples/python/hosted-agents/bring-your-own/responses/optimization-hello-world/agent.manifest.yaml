# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: optimization-hello-world-python-responses
displayName: "Optimization Hello World (Python, Responses)"
description: >
  Minimal Hello World agent using the Responses protocol with agent optimizer
  support. Demonstrates how optimization config is loaded at runtime —
  use this as the starting point to understand the optimization flow.
metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - Bring Your Own
    - Python
    - Agent Optimization
template:
  name: optimization-hello-world-python-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: OPTIMIZATION_LOCAL_DIR
      value: .agent_configs
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: model
    id: gpt-5.4
    name: OPTIMIZATION_MODEL_DEPLOYMENT_NAME

# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: browser-automation-agent-sample-foundry
description: |
    A Foundry-hosted browser automation agent sample for general browsing, web scraping, and form filling.
metadata:
    tags:
        - Agent Framework
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - Browser Automation
protocols:
    - protocol: responses
      version: 2.0.0
resources:
    cpu: "0.25"
    memory: 0.5Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-4.1
    - name: TOOLBOX_BROWSER_AUTOMATION_TOOLS_MCP_ENDPOINT
      value: ${TOOLBOX_BROWSER_AUTOMATION_TOOLS_MCP_ENDPOINT}

# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: optimization-customer-support-python-responses
displayName: "Optimization Customer Support (Python, Responses)"
description: >
  Realistic customer support agent for a consumer electronics company with
  agent optimizer support. Demonstrates meaningful instruction and skill
  optimization — ships with eval dataset for out-of-the-box optimization.
metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - Bring Your Own
    - Python
    - Agent Optimization
    - Customer Support
template:
  name: optimization-customer-support-python-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 2.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: OPTIMIZATION_LOCAL_DIR
      value: .agent_configs
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: model
    id: gpt-5.4
    name: OPTIMIZATION_MODEL_DEPLOYMENT_NAME

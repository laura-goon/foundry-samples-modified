# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: hello-world-session-multiplexing-python-responses
description: |
    Minimal Hello World BYO Responses agent using protocol 2.0.0 to demonstrate multiple callers sharing one hosted-agent session while previous_response_id history remains scoped to the platform-resolved user.
metadata:
    tags:
        - AI Agent Hosting
        - Responses Protocol
        - Bring Your Own
        - Python
        - Session Multiplexing
protocols:
    - protocol: responses
      version: 2.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5.4-mini

# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: openai-agents-sdk-invocations
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
  openai-agents-sdk-invocations:
    host: azure.ai.agent
    metadata:
      tags:
        - AI Agent Hosting
        - OpenAI SDK
        - Responses Protocol
        - Bring Your Own
    project: src/openai-agents-sdk-invocations
    language: python
    codeConfiguration:
      runtime: python_3_13
      entryPoint: main.py
    uses:
      - ai-project
    kind: hosted
    name: openai-agents-sdk-invocations
    displayName: OpenAI Agents SDK (Responses)
    description: A getting-started agent that uses the OpenAI Agents SDK (openai-agents) with Foundry Azure credential flow — no OPENAI_API_KEY required. The SDK's Agent and Runner drive the agent loop through the Responses protocol, with multi-turn conversation history managed by the platform.
    protocols:
      - protocol: responses
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

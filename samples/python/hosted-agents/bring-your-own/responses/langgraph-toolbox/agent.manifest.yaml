name: toolbox-langgraph
description: >
  LangGraph ReAct agent wired to an toolbox MCP endpoint in Microsoft Foundry.
  Connects to a hosted toolbox via MCP and exposes its tools through a
  LangGraph ReAct loop with Azure OpenAI.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
    - Toolbox
    - MCP
    - Microsoft Foundry
template:
  name: toolbox-langgraph
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    # Full MCP endpoint of the toolbox the agent consumes. Create the toolbox
    # from the bundled toolbox.yaml, then copy the versioned endpoint it prints
    # and store it in your azd environment before you run or deploy:
    #   azd ai toolbox create my-toolbox --from-file ./toolbox.yaml
    #   azd env set TOOLBOX_ENDPOINT "<endpoint-from-output>"
    - name: TOOLBOX_ENDPOINT
      value: "{{TOOLBOX_ENDPOINT}}"
resources:
  - kind: model
    id: gpt-4.1
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

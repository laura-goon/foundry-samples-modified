# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: env-vars-agent-responses-python
displayName: "Env Vars Agent (Python, Responses)"
description: >
  A hosted agent that returns environment variables injected by Foundry's
  connection-templated secret resolver. Demonstrates all four corners of
  the connection grid (ApiKey x CustomKeys, secret x non-secret) and a
  kind-aware safety policy: metadata and target values are returned
  verbatim; credentials are returned only as a safe fingerprint.
metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - Bring Your Own
    - Function Calling
    - Connection Resolution
    - Python
template:
  name: env-vars-agent-responses-python
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING
    # are injected by the platform (hosted) and translated by azd (local)
    # â€” do NOT declare them here.
    #
    # Model deployment name â€” resolved from the resources section below.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"

    # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    # Connection-templated injection â€” resolved at runtime by the
    # platform's secret resolver. Three placeholder paths are supported:
    #
    #   credentials.<field>  -> secret store
    #       ApiKey:     ${{connections.<name>.credentials.key}}
    #       CustomKeys: ${{connections.<name>.credentials.<your-secret-key-name>}}
    #   target               -> the connection's endpoint URL
    #       Any kind:   ${{connections.<name>.target}}
    #   metadata.<key>       -> the connection's metadata bag (plain, non-secret values)
    #       CustomKeys: ${{connections.<name>.metadata.<your-plain-key-name>}}
    #
    # CustomKeys note: each custom key is stored as a secret (in credentials)
    # or plain (in metadata) at the time you add it. A single CustomKeys
    # connection can hold any mix of both.
    #
    # The agent's get_env_var(name, kind) tool mirrors these paths:
    # call it with kind=metadata or kind=target to get the whole value;
    # call it with kind=credentials (the default) to get a fingerprint only.
    #
    # The four examples below cover ApiKey x CustomKeys x secret x non-secret:
    #
    #   SECRET_API_KEY    ApiKey     credentials.key             (secret)
    #   TARGET            ApiKey     target                      (non-secret)
    #   SECRET_KEY        CustomKeys credentials.<secret-key>    (secret)
    #   NON_SECRET_KEY    CustomKeys metadata.<plain-key>        (non-secret)
    #
    # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # #
    # Replace the dummy values below â€” `dummy-api-key`, `dummy-custom-keys`,     #
    # `secret-key`, and `plain-key` â€” with the real names from your project.    #
    # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # # #
    - name: SECRET_API_KEY
      value: "${{connections.dummy-api-key.credentials.key}}"
    - name: TARGET
      value: "${{connections.dummy-api-key.target}}"
    - name: SECRET_KEY
      value: "${{connections.dummy-custom-keys.credentials.secret-key}}"
    - name: NON_SECRET_KEY
      value: "${{connections.dummy-custom-keys.metadata.plain-key}}"
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

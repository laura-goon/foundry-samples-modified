# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: event-grid-trigger-python-invocations
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
  event-grid-trigger-python-invocations:
    host: azure.ai.agent
    metadata:
      tags:
        - AI Agent Hosting
        - Invocations Protocol
        - Bring Your Own
        - Event-Driven
        - Event Grid
        - Managed Identity
        - Azure Storage
        - Python
    project: src/event-grid-trigger-python-invocations
    language: python
    codeConfiguration:
      runtime: python_3_13
      entryPoint: main.py
    uses:
      - ai-project
    kind: hosted
    name: event-grid-trigger-python-invocations
    displayName: Event Grid → hosted agent (blob trigger, Python, Invocations)
    description: BYO Invocations agent that Event Grid POSTs to directly using the system topic's system-assigned managed identity with audience https://ai.azure.com. Receives Storage BlobCreated events, downloads the blob with the per-agent Microsoft Entra identity, and writes a summary back to a sibling container.
    protocols:
      - protocol: invocations
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
      - name: AZURE_STORAGE_ACCOUNT_NAME
        value: ${AZURE_STORAGE_ACCOUNT_NAME}
      - name: AZURE_STORAGE_SUMMARY_CONTAINER_NAME
        value: ${AZURE_STORAGE_SUMMARY_CONTAINER_NAME}
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: event-grid-trigger-python-invocations
displayName: "Event Grid → hosted agent (blob trigger, Python, Invocations)"
description: >
  BYO Invocations agent that Event Grid POSTs to directly using the
  system topic's system-assigned managed identity with audience
  https://ai.azure.com. Receives Storage BlobCreated events, downloads
  the blob with the per-agent Microsoft Entra identity, and writes a
  summary back to a sibling container.
metadata:
  tags:
    - AI Agent Hosting
    - Invocations Protocol
    - Bring Your Own
    - Event-Driven
    - Event Grid
    - Managed Identity
    - Azure Storage
    - Python
template:
  name: event-grid-trigger-python-invocations
  kind: hosted
  protocols:
    - protocol: invocations
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING are
    # injected by the platform (hosted) and translated by azd (local) — do not
    # declare them here.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    # Storage. Per-agent identity needs:
    #   Storage Blob Data Reader on the source container
    #   Storage Blob Data Contributor on the summary (output) container
    - name: AZURE_STORAGE_ACCOUNT_NAME
      value: ${AZURE_STORAGE_ACCOUNT_NAME}
    # Required: name of the container the agent writes <name>.summary.json to.
    # Must be distinct from the input container so writes do not re-trigger
    # Event Grid.
    - name: AZURE_STORAGE_SUMMARY_CONTAINER_NAME
      value: ${AZURE_STORAGE_SUMMARY_CONTAINER_NAME}
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

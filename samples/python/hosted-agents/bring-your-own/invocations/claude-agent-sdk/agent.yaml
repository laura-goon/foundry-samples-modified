# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: claude-agent-sdk-invocations
description: |
    A getting-started agent that uses the Claude Agent SDK with Microsoft Foundry authentication and the azure-ai-agentserver-invocations protocol, streaming assistant deltas as Server-Sent Events (SSE).
metadata:
    tags:
        - AI Agent Hosting
        - Claude Agent SDK
        - Anthropic
        - Invocations Protocol
        - Bring Your Own
protocols:
    - protocol: invocations
      version: 2.0.0
resources:
    cpu: "0.25"
    memory: 0.5Gi
environment_variables:
    - name: CLAUDE_CODE_USE_FOUNDRY
      value: "1"
    - name: ANTHROPIC_MODEL
      value: "claude-opus-4-7"

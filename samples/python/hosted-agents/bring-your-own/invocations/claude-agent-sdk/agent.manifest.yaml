# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: claude-agent-sdk-invocations
displayName: "Claude Agent SDK (Invocations)"
description: >
  A getting-started agent that uses the Claude Agent SDK with Microsoft Foundry
  authentication and the azure-ai-agentserver-invocations protocol, streaming
  assistant deltas as Server-Sent Events (SSE).
metadata:
  tags:
    - AI Agent Hosting
    - Claude Agent SDK
    - Anthropic
    - Invocations Protocol
    - Bring Your Own
template:
  name: claude-agent-sdk-invocations
  kind: hosted
  protocols:
    - protocol: invocations
      version: 1.0.0
  environment_variables:
    # APPLICATIONINSIGHTS_CONNECTION_STRING is auto-injected by the platform.
    # Do not declare it here.
    - name: CLAUDE_CODE_USE_FOUNDRY
      value: "1"
    - name: ANTHROPIC_MODEL
      value: "claude-opus-4-7"
parameters:
  properties: []
resources: []

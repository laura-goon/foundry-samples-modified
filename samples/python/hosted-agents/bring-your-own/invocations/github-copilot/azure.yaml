# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: github-copilot-invocations
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
  github-copilot-invocations:
    host: azure.ai.agent
    metadata:
      tags:
        - AI Agent Hosting
        - GitHub Copilot SDK
        - Invocations Protocol
        - Streaming
    project: src/github-copilot-invocations
    language: python
    codeConfiguration:
      runtime: python_3_13
      entryPoint: main.py
    uses:
      - ai-project
    kind: hosted
    name: github-copilot-invocations
    displayName: GitHub Copilot Invocations
    description: A getting-started agent that uses the GitHub Copilot SDK (CopilotClient) with the azure-ai-agentserver-invocations protocol, streaming raw session events as Server-Sent Events (SSE).
    protocols:
      - protocol: invocations
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

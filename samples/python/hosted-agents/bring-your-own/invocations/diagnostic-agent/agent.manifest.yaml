# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: diagnostic-agent-python-invocations
displayName: "Diagnostic Agent (Python, Invocations)"
description: >
  Network and environment diagnostic agent. On invocation, runs DNS / TCP / TLS /
  HTTP probes against caller-supplied hostnames (e.g. a private ACR), dumps the
  container's networking state (IP, routes, resolvers). Designed to verify what
  a hosted-agent runtime can actually reach from inside the delegated agent subnet.
metadata:
  tags:
    - AI Agent Hosting
    - Invocations Protocol
    - Bring Your Own
    - Python
    - Diagnostics
template:
  name: diagnostic-agent-python-invocations
  kind: hosted
  protocols:
    - protocol: invocations
      version: 2.0.0
  # No environment_variables and no resources block:
  # the diagnostic-agent intentionally requires no model and no Foundry project
  # endpoint. Everything it needs is on the container itself.

# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: hello-world-python-invocations-voicelive
displayName: "Hello World (Python, Invocations, VoiceLive)"
description: >
  Minimal Hello World agent using the Invocations protocol with a bring-your-own
  approach, designed for VoiceLive compatibility. It can work with Voice Live SDK
  to do real-time voice interactions.
metadata:
  voiceLiveCompatible: "true"
  tags:
    - AI Agent Hosting
    - Invocations Protocol
    - Bring Your Own
    - Python
template:
  name: hello-world-python-invocations-voicelive
  kind: hosted
  protocols:
    - protocol: invocations
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING
    # are injected by the platform (hosted) and translated by azd (local)
    # — do NOT declare them here.
    #
    # Model deployment name — resolved from the resources section below.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

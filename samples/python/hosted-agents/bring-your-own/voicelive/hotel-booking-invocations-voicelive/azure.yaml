# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: hotel-booking-python-invocations-voicelive
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
  hotel-booking-python-invocations-voicelive:
    host: azure.ai.agent
    metadata:
      voiceLiveCompatible: "true"
      tags:
        - AI Agent Hosting
        - Azure AI AgentServer
        - Invocations Protocol
        - Streaming
        - Voice + Click
    project: src/hotel-booking-python-invocations-voicelive
    language: python
    codeConfiguration:
      runtime: python_3_13
      entryPoint: main.py
    uses:
      - ai-project
    kind: hosted
    name: hotel-booking-python-invocations-voicelive
    displayName: Hotel Booking Agent
    description: A hotel booking agent demonstrating voice + click interactions. Handles natural language hotel search via voice and hotel selection / booking confirmation via button clicks. Designed for Voice Live SDK multi-modal scenarios.
    protocols:
      - protocol: invocations
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

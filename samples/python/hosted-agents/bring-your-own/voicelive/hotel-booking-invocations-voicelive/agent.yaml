# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: hotel-booking-python-invocations-voicelive
description: |
    A hotel booking agent demonstrating voice + click interactions. Handles natural language hotel search via voice and hotel selection / booking confirmation via button clicks. Designed for Voice Live SDK multi-modal scenarios.
metadata:
    tags:
        - AI Agent Hosting
        - Azure AI AgentServer
        - Invocations Protocol
        - Streaming
        - Voice + Click
    voiceLiveCompatible: "true"
protocols:
    - protocol: invocations
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}

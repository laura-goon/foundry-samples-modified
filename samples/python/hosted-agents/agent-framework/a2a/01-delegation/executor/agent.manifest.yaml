name: agent-framework-a2a-executor-responses
description: >
  An Agent Framework hosted agent (Responses protocol) that answers arithmetic /
  math questions. Once deployed, run `scripts/setup-a2a.{sh,ps1}` to turn on
  incoming A2A so other Foundry agents can reach it through Foundry's A2A
  endpoint.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - A2A
    - Incoming A2A
template:
  name: agent-framework-a2a-executor-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

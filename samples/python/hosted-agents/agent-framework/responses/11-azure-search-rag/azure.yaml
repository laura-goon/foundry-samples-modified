# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: agent-framework-agent-azure-search-rag-responses
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
  agent-framework-agent-azure-search-rag-responses:
    host: azure.ai.agent
    metadata:
      tags:
        - Agent Framework
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - RAG
        - Azure AI Search
    project: src/agent-framework-agent-azure-search-rag-responses
    language: python
    codeConfiguration:
      runtime: python_3_13
      entryPoint: main.py
    uses:
      - ai-project
    kind: hosted
    name: agent-framework-agent-azure-search-rag-responses
    description: An Agent Framework agent with Retrieval Augmented Generation (RAG) capabilities backed by Azure AI Search. Uses AzureAISearchContextProvider to ground answers in product documentation indexed in Azure AI Search before each model invocation.
    protocols:
      - protocol: responses
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
      - name: AZURE_SEARCH_ENDPOINT
        value: ${AZURE_SEARCH_ENDPOINT}
      - name: AZURE_SEARCH_INDEX_NAME
        value: ${AZURE_SEARCH_INDEX_NAME}
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

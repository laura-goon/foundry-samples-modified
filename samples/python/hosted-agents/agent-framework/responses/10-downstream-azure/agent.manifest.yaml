name: agent-framework-agent-downstream-azure-responses
description: >
  An Agent Framework hosted agent that operates on Azure Blob Storage and
  Service Bus using its per-agent Microsoft Entra identity. Demonstrates the
  manual RBAC assignment pattern for Azure data-plane services.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Agent Identity
    - Azure Storage
    - Azure Service Bus
template:
  name: agent-framework-agent-downstream-azure-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    # Azure Blob Storage. The per-agent identity needs a data-plane role
    # (e.g. Storage Blob Data Contributor) on the container — see README.
    - name: AZURE_STORAGE_ACCOUNT_NAME
      value: ${AZURE_STORAGE_ACCOUNT_NAME}
    - name: AZURE_STORAGE_CONTAINER_NAME
      value: ${AZURE_STORAGE_CONTAINER_NAME}
    # Azure Service Bus queue. The per-agent identity needs Azure Service Bus
    # Data Sender (to send) and Azure Service Bus Data Receiver (to peek/receive).
    - name: AZURE_SERVICEBUS_FQDN
      value: ${AZURE_SERVICEBUS_FQDN}
    - name: AZURE_SERVICEBUS_QUEUE_NAME
      value: ${AZURE_SERVICEBUS_QUEUE_NAME}
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

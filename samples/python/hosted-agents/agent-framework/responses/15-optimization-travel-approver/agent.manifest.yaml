# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: optimization-travel-approver-python-responses
displayName: "Optimization Travel Approver (Python, Agent Framework)"
description: >
  Travel request approval agent using Agent Framework with agent optimizer
  support. Demonstrates tool, skill, and instruction optimization with
  a realistic business scenario.
metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - Agent Framework
    - Python
    - Agent Optimization
    - Travel Approval
template:
  name: optimization-travel-approver-python-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: OPTIMIZATION_LOCAL_DIR
      value: .agent_configs
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: model
    id: gpt-5.4
    name: OPTIMIZATION_MODEL_DEPLOYMENT_NAME

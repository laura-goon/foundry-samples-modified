# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: agent-framework-foundry-iq-knowledge-base-responses
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
  agent-framework-foundry-iq-knowledge-base-responses:
    host: azure.ai.agent
    metadata:
      tags:
        - Agent Framework
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - Foundry IQ
        - Knowledge Base
        - Agentic Retrieval
        - Azure AI Search
    project: src/agent-framework-foundry-iq-knowledge-base-responses
    language: python
    codeConfiguration:
      runtime: python_3_13
      entryPoint: main.py
    uses:
      - ai-project
    kind: hosted
    name: agent-framework-foundry-iq-knowledge-base-responses
    displayName: Foundry IQ Knowledge Base Agent
    description: An Agent Framework agent that answers questions from a Foundry IQ knowledge base (Azure AI Search agentic retrieval), reached through a Foundry toolbox. The toolbox connects to the knowledge base's MCP endpoint using the agent's managed identity (Agentic Identity) for keyless Entra ID authentication.
    protocols:
      - protocol: responses
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
      - name: TOOLBOX_ENDPOINT
        value: ${TOOLBOX_ENDPOINT}
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

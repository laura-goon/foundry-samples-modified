# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: agent-framework-foundry-iq-knowledge-base-responses
displayName: "Foundry IQ Knowledge Base Agent"
description: >
  An Agent Framework agent that answers questions from a Foundry IQ knowledge
  base (Azure AI Search agentic retrieval), reached through a Foundry toolbox.
  The toolbox connects to the knowledge base's MCP endpoint using the agent's
  managed identity (Agentic Identity) for keyless Entra ID authentication.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Foundry IQ
    - Knowledge Base
    - Agentic Retrieval
    - Azure AI Search
template:
  name: agent-framework-foundry-iq-knowledge-base-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    # Full MCP endpoint of the toolbox the agent consumes. The postprovision hook
    # creates the connection and toolbox from the bundled toolbox.yaml and sets the
    # TOOLBOX_ENDPOINT azd environment variable; ${TOOLBOX_ENDPOINT} resolves from it
    # at deploy time. To wire it up by hand instead, run:
    #   azd ai connection create knowledge-base-mcp --kind remote-tool \
    #     --target "<kb-mcp-endpoint>" --auth-type agentic-identity \
    #     --audience https://search.azure.com --metadata "ApiType=Azure"
    #   azd ai toolbox create knowledge-base --from-file ./toolbox.yaml
    #   azd env set TOOLBOX_ENDPOINT "<endpoint-from-output>"
    - name: TOOLBOX_ENDPOINT
      value: "${TOOLBOX_ENDPOINT}"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

name: toolbox-langgraph
displayName: "LangGraph Toolbox Agent (Responses)"
description: >
  LangGraph ReAct agent wired to a Foundry Toolbox in Microsoft Foundry. The
  toolbox exposes `web_search` plus a connection-backed GitHub Copilot MCP
  tool. Tools are loaded via langchain_azure_ai.tools.AzureAIProjectToolbox
  and hosted on Foundry over the Responses protocol.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
    - LangChain
    - Toolbox
    - MCP
    - Microsoft Foundry
    - Python
template:
  name: toolbox-langgraph
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING
    # are injected by the platform (hosted) and translated by azd (local)
    # — do NOT declare them here.
    #
    # Model deployment name — resolved from the resources section below.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    # Name of the toolbox the agent consumes at runtime. Create the toolbox from
    # the bundled toolbox.yaml before you run the agent:
    #   azd ai toolbox create my-toolbox --from-file ./toolbox.yaml
    - name: TOOLBOX_NAME
      value: "my-toolbox"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

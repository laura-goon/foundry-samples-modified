name: toolbox-langgraph
displayName: "LangGraph Toolbox Agent (Responses)"
description: >
  LangGraph ReAct agent wired to a Foundry Toolbox in Microsoft Foundry. The
  toolbox exposes `web_search` plus a connection-backed GitHub Copilot MCP
  tool. Tools are loaded via langchain_azure_ai.tools.AzureAIProjectToolbox
  and hosted on Foundry over the Responses protocol.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
    - LangChain
    - Toolbox
    - MCP
    - Microsoft Foundry
    - Python
template:
  name: toolbox-langgraph
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING
    # are injected by the platform (hosted) and translated by azd (local)
    # — do NOT declare them here.
    #
    # Model deployment name — resolved from the resources section below.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_NAME
      value: "agent-tools"
# Secret values prompted at `azd ai agent init` (or set with `azd env set`).
# The GitHub PAT is consumed by the github-mcp-conn connection below — it
# is never injected into the agent container. azd uppercases the parameter
# name to find the env var: github_pat → GITHUB_PAT.
parameters:
  github_pat:
    secret: true
    description: GitHub Personal Access Token (classic ghp_... or fine-grained github_pat_...)
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: connection
    name: github-mcp-conn
    target: https://api.githubcopilot.com/mcp
    category: remoteTool
    credentials:
      type: CustomKeys
      keys:
        Authorization: "Bearer {{ github_pat }}"
  - kind: toolbox
    name: agent-tools
    tools:
      - type: web_search
      - type: mcp
        server_label: github
        server_url: https://api.githubcopilot.com/mcp
        project_connection_id: github-mcp-conn

# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: langgraph-human-in-the-loop-responses
displayName: "LangGraph Human-in-the-Loop (Responses)"
description: >
  LangGraph agent hosted on Foundry over the Responses protocol that
  drafts a proposal and pauses for human review. Demonstrates the
  approve / revise / reject decision flow over the standard OpenAI
  mcp_approval_request channel plus the paired function_call rich
  resume channel, with conversation-scoped checkpointing.
metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - LangGraph
    - LangChain
    - Human-in-the-Loop
    - Approval
    - Checkpointing
    - Python
template:
  name: langgraph-human-in-the-loop-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 2.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT is injected by the platform (hosted) and
    # translated by azd (local) — do NOT declare it here.
    #
    # Model deployment name — resolved from the resources section below.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME


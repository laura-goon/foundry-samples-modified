# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: langgraph-human-in-the-loop-responses
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
  langgraph-human-in-the-loop-responses:
    host: azure.ai.agent
    metadata:
      tags:
        - AI Agent Hosting
        - Responses Protocol
        - LangGraph
        - LangChain
        - Human-in-the-Loop
        - Approval
        - Checkpointing
        - Python
    project: src/langgraph-human-in-the-loop-responses
    language: python
    codeConfiguration:
      runtime: python_3_13
      entryPoint: main.py
    uses:
      - ai-project
    kind: hosted
    name: langgraph-human-in-the-loop-responses
    displayName: LangGraph Human-in-the-Loop (Responses)
    description: LangGraph agent hosted on Foundry over the Responses protocol that drafts a proposal and pauses for human review. Demonstrates the approve / revise / reject decision flow over the standard OpenAI mcp_approval_request channel plus the paired function_call rich resume channel, with conversation-scoped checkpointing.
    protocols:
      - protocol: responses
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

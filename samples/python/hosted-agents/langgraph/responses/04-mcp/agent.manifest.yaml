# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: langgraph-mcp-responses
displayName: "LangGraph + Remote MCP (Responses)"
description: >
  LangGraph agent hosted on Foundry over the Responses protocol, with tools
  loaded from a remote MCP server (GitHub Copilot MCP by default) via
  langchain-mcp-adapters.
metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - LangGraph
    - LangChain
    - MCP
    - Python
template:
  name: langgraph-mcp-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING
    # are injected by the platform (hosted) and translated by azd (local)
    # — do NOT declare them here.
    #
    # Model deployment name — resolved from the resources section below.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    # GitHub Personal Access Token for the remote MCP server. Resolved
    # from the azd environment at deploy time — set it with
    # `azd env set GITHUB_PAT <token>` before `azd deploy`.
    - name: GITHUB_PAT
      value: ${GITHUB_PAT}
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

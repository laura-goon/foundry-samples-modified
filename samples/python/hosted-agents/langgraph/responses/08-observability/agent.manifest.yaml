# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: langgraph-observability-responses
displayName: "LangGraph Observability (Responses)"
description: >
  Instrumented LangGraph agent hosted on Foundry over the Responses protocol.
  Emits GenAI OpenTelemetry spans for every node, LLM call, and tool
  invocation into the project's managed Application Insights workspace.
metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - LangGraph
    - LangChain
    - Observability
    - OpenTelemetry
    - Python
template:
  name: langgraph-observability-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING
    # are injected by the platform (hosted) and translated by azd (local)
    # — do NOT declare them here.
    #
    # Model deployment name — resolved from the resources section below.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    # Let enable_auto_tracing() configure Azure Monitor itself, using the
    # APPLICATIONINSIGHTS_CONNECTION_STRING injected by the platform.
    - name: OTEL_AUTO_CONFIGURE_AZURE_MONITOR
      value: "true"
    # Capture message/content payloads in GenAI spans.
    - name: AZURE_TRACING_GEN_AI_CONTENT_RECORDING_ENABLED
      value: "true"
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME

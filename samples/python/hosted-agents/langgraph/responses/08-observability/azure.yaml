# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
  extensions:
    azure.ai.agents: '>=1.0.0-beta.4'
name: langgraph-observability-responses
services:
  ai-project:
    host: azure.ai.project
    deployments:
      - name: gpt-5.4-mini
        model:
          format: OpenAI
          name: gpt-5.4-mini
          version: '2026-03-17'
        sku:
          name: GlobalStandard
          capacity: 10
  langgraph-observability-responses:
    host: azure.ai.agent
    metadata:
      tags:
        - AI Agent Hosting
        - Responses Protocol
        - LangGraph
        - LangChain
        - Observability
        - OpenTelemetry
        - Python
    project: src/langgraph-observability-responses
    language: python
    codeConfiguration:
      runtime: python_3_13
      entryPoint: main.py
    uses:
      - ai-project
    kind: hosted
    name: langgraph-observability-responses
    displayName: LangGraph Observability (Responses)
    description: Instrumented LangGraph agent hosted on Foundry over the Responses protocol. Emits GenAI OpenTelemetry spans for every node, LLM call, and tool invocation into the project's managed Application Insights workspace.
    protocols:
      - protocol: responses
        version: 2.0.0
    environmentVariables:
      - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
        value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
      - name: OTEL_AUTO_CONFIGURE_AZURE_MONITOR
        value: 'true'
      - name: AZURE_TRACING_GEN_AI_CONTENT_RECORDING_ENABLED
        value: 'true'
    container:
      resources:
        cpu: '0.5'
        memory: 1Gi
infra:
  provider: microsoft.foundry

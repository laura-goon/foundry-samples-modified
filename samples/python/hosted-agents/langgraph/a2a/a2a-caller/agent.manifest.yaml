# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: concierge
displayName: "LangGraph A2A Caller — Concierge (Responses)"
description: >
  A LangGraph concierge agent hosted on Foundry over the Responses protocol that
  delegates tasks to a remote Foundry-hosted A2A executor agent through a Foundry
  Toolbox A2A connection, loaded over MCP via langchain-mcp-adapters.
metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - LangGraph
    - LangChain
    - A2A
    - MCP
    - Python
template:
  name: concierge
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT is injected by the platform (hosted) and
    # translated by azd (local) — do NOT declare it here.
    #
    # Model deployment name — resolved from the resources section below.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    # Name of the Foundry Toolbox to load delegation tools from over MCP.
    - name: TOOLBOX_NAME
      value: "a2a-delegation-tools"
parameters:
  properties:
    - name: a2a_executor_endpoint
      secret: false
      description: >
        URL of the executor's incoming A2A endpoint. Provision and deploy the
        executor FIRST (see this sample's README), then paste the value of
        `azd env get-value FOUNDRY_PROJECT_ENDPOINT` with the agent path appended:
        <FOUNDRY_PROJECT_ENDPOINT>/agents/math-expert/endpoint/protocols/a2a/
        Because the executor already exists, this is a real, working URL — no
        placeholder, no two-phase patch, and no hook are needed.
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: connection
    name: math-expert-a2a
    category: RemoteA2A
    authType: UserEntraToken
    audience: https://ai.azure.com
    target: "{{ a2a_executor_endpoint }}"
    metadata:
      AgentCardPath: /agentCard/v1.0
  - kind: toolbox
    name: a2a-delegation-tools
    description: Toolbox exposing the math-expert A2A executor agent.
    tools:
      - type: a2a_preview
        name: math_expert
        description: Delegates arithmetic and math questions to the math-expert A2A agent.
        project_connection_id: math-expert-a2a
        agent_card_path: agentCard/v1.0

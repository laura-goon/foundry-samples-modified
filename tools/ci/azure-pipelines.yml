trigger:
  branches:
    include:
    - main
  paths:
    include:
    - tools/sample-templates/**
    - tools/sample-configs/**

pr:
  branches:
    include:
      - "*"

pool:
  vmImage: 'ubuntu-latest'

parameters:
  # this parameter allows selecting different input data files for generating samples,
  # selection happens as a dropdown in the ADO UI
  - name: CIConfigInput
    displayName: 'CI Configuration Input File'
    type: string
    default: 'default.yaml'
    values:
      - 'default.yaml'
      - 'foundry-ux.yaml'
      - 'default-publish.yaml'

variables:
  - name: dotnetVersion
    value: '9.x'
  - name: PROJECT_ROOT_DIR
    value: 'tools'
  # Directory to which samples are generated as specified in config files
  - name: GENERATED_SAMPLES_DIR
    value: 'tools/generated-samples'
  # Directory to which samples are published in the repo
  - name: PUBLISHED_SAMPLES_DIR
    value: 'generated-samples'
  - ${{ if eq(variables['Build.Reason'], 'IndividualCI') }}:
    - template: configs/default-publish.yaml
  - ${{ else }}:
    - template: configs/${{ parameters.CIConfigInput }}

stages:
- stage: GenerateSamples
  displayName: 'Generate Code Samples'
  condition: eq(variables['runGenerateSamples'], 'true')
  jobs:
  - job: GenerateSamples
    displayName: 'Generate Code Samples'
    steps:
    - checkout: self
    - script: |
        npm install -g @caleuche/cli
      displayName: 'Install Caleuche CLI'
    - script: |
        echo "Generating samples with input: $(templateConfig)"
        # Generate samples using che batch command
        che batch $(PROJECT_ROOT_DIR)/sample-configs/$(templateConfig)
      displayName: 'Generate samples'

    - publish: $(GENERATED_SAMPLES_DIR)/
      artifact: GeneratedSamples
      displayName: 'Publish generated samples'

- stage: ValidateSamples
  displayName: 'Validate Changed Samples'
  dependsOn: GenerateSamples
  condition: eq(variables['runValidateSamples'], 'true')
  jobs:
  - job: ConfigureCredentials
    displayName: 'Configure Azure OpenAI Credentials'
    steps:
    - task: AzureCLI@2
      displayName: 'Get Azure OpenAI credentials'
      inputs:
        azureSubscription: $(ARM_SERVICE_CONNECTION_NAME)
        addSpnToEnvironment: true
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
        
          # Azure DevOps injects these when addSpnToEnvironment: true
          echo "Using client id: $servicePrincipalId"
          echo "Tenant id: $tenantId"

          # Use the provided endpoint when available; otherwise query the resource
          ENDPOINT=$(AZURE_OPENAI_ENDPOINT)
          if [ -z "$ENDPOINT" ]; then
            ENDPOINT=$(az cognitiveservices account show \
              --name $(AZURE_OPENAI_SERVICE) \
              --resource-group $(RESOURCE_GROUP) \
              --query "properties.endpoint" -o tsv)
          else
            echo "Using provided endpoint: $ENDPOINT"
          fi
          
          # If API key is not provided, get API key from Azure OpenAI resource
          API_KEY=$(AZURE_OPENAI_API_KEY)
          if [ -z "$API_KEY" ]; then
            API_KEY=$(az cognitiveservices account keys list \
              --name $(AZURE_OPENAI_SERVICE) \
              --resource-group $(RESOURCE_GROUP) \
              --query "key1" -o tsv)
          else
            echo "Using provided API key"
          fi

          # Get predefined deployment if available
          DEPLOYMENT=$(AZURE_OPENAI_DEPLOYMENT)

          # Set as pipeline variables for use in subsequent jobs
          echo "##vso[task.setvariable variable=AZURE_OPENAI_ENDPOINT;isOutput=true]$ENDPOINT"
          echo "##vso[task.setvariable variable=AZURE_OPENAI_API_KEY;isOutput=true]$API_KEY"
          echo "##vso[task.setvariable variable=AZURE_OPENAI_DEPLOYMENT;isOutput=true]$DEPLOYMENT"
          echo "##vso[task.setvariable variable=AZURE_CLIENT_ID;isOutput=true]$servicePrincipalId"
          echo "##vso[task.setvariable variable=AZURE_TENANT_ID;isOutput=true]$tenantId"

          # (Optional) Prove the connection is valid right now
          az account show --output table || true

      name: 'configureCredentials'

  - job: PublishConfigs
    displayName: 'Publish build configurations for samples'
    steps:
    - script: |
        # Publish configs to generated directories
        chmod +x $(PROJECT_ROOT_DIR)/ci/scripts/publish-configs.sh
        ./$(PROJECT_ROOT_DIR)/ci/scripts/publish-configs.sh
      displayName: 'Publish configurations'
    
    # Publish the generated config files as artifacts so we can access them in validation jobs
    - publish: $(GENERATED_SAMPLES_DIR)/
      artifact: GeneratedConfigs
      displayName: 'Publish generated configurations'

  - job: DetectChanges
    displayName: 'Detect Changed Samples'
    steps:
    - checkout: self
      fetchDepth: 0
    - download: current
      artifact: GeneratedSamples
      displayName: 'Download generated samples'

    - script: |
        mkdir -p $(PUBLISHED_SAMPLES_DIR)
        cp -r "$(Pipeline.Workspace)/GeneratedSamples/"* $(PUBLISHED_SAMPLES_DIR)/
        echo "Copied downloaded samples to $(PUBLISHED_SAMPLES_DIR)/"
      displayName: 'Copy sample artifacts to workspace'

    - script: |
        # Ensure we have the main branch reference
        git fetch origin main:main || git fetch origin main
        
        # Get changed sample directories (compare working tree to main, not HEAD to main)
        (git diff --name-only main; git ls-files --others --exclude-standard) | grep "^$(PUBLISHED_SAMPLES_DIR)/" | xargs -n1 dirname | sort | uniq > changed_samples.txt || touch changed_samples.txt
        echo "Changed sample directories:"
        cat changed_samples.txt

        # Split by language
        grep "/csharp/" changed_samples.txt > changed_csharp.txt || touch changed_csharp.txt
        grep "/python/" changed_samples.txt > changed_python.txt || touch changed_python.txt
        grep "/java/" changed_samples.txt > changed_java.txt || touch changed_java.txt
        grep "/go/" changed_samples.txt > changed_go.txt || touch changed_go.txt
        grep "/javascript/" changed_samples.txt > changed_javascript.txt || touch changed_javascript.txt
        grep "/curl/" changed_samples.txt > changed_curl.txt || touch changed_curl.txt

        echo "Changed C# samples:"
        cat changed_csharp.txt
        echo "Changed Python samples:"
        cat changed_python.txt
        echo "Changed Java samples:"
        cat changed_java.txt
        echo "Changed Go samples:"
        cat changed_go.txt
        echo "Changed Javascript samples:"
        cat changed_javascript.txt
        echo "Changed Curl samples:"
        cat changed_curl.txt

        # Set variables for conditional jobs
        echo "##vso[task.setvariable variable=hasCSharpChanges;isOutput=true]$([ -s changed_csharp.txt ] && echo 'true' || echo 'false')"
        echo "##vso[task.setvariable variable=hasPythonChanges;isOutput=true]$([ -s changed_python.txt ] && echo 'true' || echo 'false')"
        echo "##vso[task.setvariable variable=hasJavaChanges;isOutput=true]$([ -s changed_java.txt ] && echo 'true' || echo 'false')"
        echo "##vso[task.setvariable variable=hasGoChanges;isOutput=true]$([ -s changed_go.txt ] && echo 'true' || echo 'false')"
        echo "##vso[task.setvariable variable=hasJavascriptChanges;isOutput=true]$([ -s changed_javascript.txt ] && echo 'true' || echo 'false')"
        echo "##vso[task.setvariable variable=hasCurlChanges;isOutput=true]$([ -s changed_curl.txt ] && echo 'true' || echo 'false')"

      displayName: 'Detect changes'
      name: 'detectChanges'
      
    - publish: changed_csharp.txt
      artifact: ChangedCSharp
      displayName: 'Publish C# changes'
      
    - publish: changed_python.txt
      artifact: ChangedPython
      displayName: 'Publish Python changes'

    - publish: changed_java.txt
      artifact: ChangedJava
      displayName: 'Publish Java changes'

    - publish: changed_go.txt
      artifact: ChangedGo
      displayName: 'Publish Go changes'

    - publish: changed_javascript.txt
      artifact: ChangedJavascript
      displayName: 'Publish Javascript changes'

    - publish: changed_curl.txt
      artifact: ChangedCurl
      displayName: 'Publish Curl changes'

  - job: ValidateCSharp
    displayName: 'Validate C# Samples'
    dependsOn: 
    - DetectChanges
    - PublishConfigs
    - ConfigureCredentials
    condition: eq(dependencies.DetectChanges.outputs['detectChanges.hasCSharpChanges'], 'true')
    variables:
      # Map the output variables from GenerateSamples job
      azureOpenAIEndpoint: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_ENDPOINT'] ]
      azureOpenAIApiKey: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_API_KEY'] ]
      azureOpenAIDeployment: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_DEPLOYMENT'] ]
      servicePrincipalId: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_CLIENT_ID'] ]
      tenantId: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_TENANT_ID'] ]
    steps:
    - checkout: self
    - task: UseDotNet@2
      inputs:
        version: $(dotnetVersion)

    - download: current
      artifact: ChangedCSharp
      displayName: 'Download list of changed C# samples'

    - download: current
      artifact: GeneratedSamples
      displayName: 'Download generated samples'

    - script: |
        mkdir -p $(PUBLISHED_SAMPLES_DIR)
        cp -r "$(Pipeline.Workspace)/GeneratedSamples/"* $(PUBLISHED_SAMPLES_DIR)/
        echo "Copied downloaded samples to $(PUBLISHED_SAMPLES_DIR)/"
      displayName: 'Copy sample artifacts to workspace'

    - download: current
      artifact: GeneratedConfigs
      displayName: 'Download generated configurations'

    - script: |
        cp -r "$(Pipeline.Workspace)/GeneratedConfigs/"* $(PUBLISHED_SAMPLES_DIR)/
      displayName: 'Copy generated configurations to workspace'

    - task: AzureCLI@2
      displayName: 'Set up Azure credentials for C# samples'
      inputs:
        azureSubscription: $(ARM_SERVICE_CONNECTION_NAME)
        addSpnToEnvironment: true
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Create token file for federated authentication
          TOKEN_FILE="$(Agent.TempDirectory)/ado-oidc-token"
          printf '%s' "$idToken" > "$TOKEN_FILE"
          chmod 600 "$TOKEN_FILE"
          
          # Set environment variables for Azure Identity SDK
          echo "##vso[task.setvariable variable=AZURE_FEDERATED_TOKEN_FILE]$TOKEN_FILE"
          echo "##vso[task.setvariable variable=AZURE_CLIENT_ID]$servicePrincipalId"
          echo "##vso[task.setvariable variable=AZURE_TENANT_ID]$tenantId"

    - script: |
        chmod +x $(PROJECT_ROOT_DIR)/ci/scripts/*.sh
        # Set environment variables for validation using the mapped variables
        export AZURE_OPENAI_ENDPOINT=$(azureOpenAIEndpoint)
        export AZURE_OPENAI_API_KEY=$(azureOpenAIApiKey)
        export AZURE_OPENAI_DEPLOYMENT=$(azureOpenAIDeployment)
        export AZURE_CLIENT_ID=$(AZURE_CLIENT_ID)
        export AZURE_TENANT_ID=$(AZURE_TENANT_ID)
        export AZURE_FEDERATED_TOKEN_FILE=$(AZURE_FEDERATED_TOKEN_FILE)
        ./$(PROJECT_ROOT_DIR)/ci/scripts/validate-samples.sh csharp "$(Pipeline.Workspace)/ChangedCSharp/changed_csharp.txt" $(VALIDATE_WITH_SERVICE)

      displayName: 'Validate C# samples'

    - script: |
        mkdir -p validation-results
        cp validation-*.log validation-results/ 2>/dev/null || echo "No validation log files found"
      displayName: 'Collect validation logs'
      condition: always()

    - publish: validation-results/
      artifact: CSharpResults
      condition: always()

  - job: ValidatePython
    displayName: 'Validate Python Samples'
    dependsOn: 
    - DetectChanges
    - PublishConfigs
    - ConfigureCredentials
    condition: eq(dependencies.DetectChanges.outputs['detectChanges.hasPythonChanges'], 'true')
    variables:
      # Map the output variables from GenerateSamples job
      azureOpenAIEndpoint: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_ENDPOINT'] ]
      azureOpenAIApiKey: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_API_KEY'] ]
      azureOpenAIDeployment: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_DEPLOYMENT'] ]
      servicePrincipalId: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_CLIENT_ID'] ]
      tenantId: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_TENANT_ID'] ]
    steps:
    - checkout: self
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'

    - download: current
      artifact: ChangedPython
      displayName: 'Download list of changed Python samples'

    - download: current
      artifact: GeneratedSamples
      displayName: 'Download generated samples'

    - script: |
        mkdir -p $(PUBLISHED_SAMPLES_DIR)
        cp -r "$(Pipeline.Workspace)/GeneratedSamples/"* $(PUBLISHED_SAMPLES_DIR)/
        echo "Copied downloaded samples to $(PUBLISHED_SAMPLES_DIR)/"
      displayName: 'Copy sample artifacts to workspace'

    - download: current
      artifact: GeneratedConfigs
      displayName: 'Download generated configurations'

    - script: |
        cp -r "$(Pipeline.Workspace)/GeneratedConfigs/"* $(PUBLISHED_SAMPLES_DIR)/
      displayName: 'Copy generated configurations to workspace'

    - task: AzureCLI@2
      displayName: 'Set up Azure credentials for Python samples'
      inputs:
        azureSubscription: $(ARM_SERVICE_CONNECTION_NAME)
        addSpnToEnvironment: true
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Create token file for federated authentication
          TOKEN_FILE="$(Agent.TempDirectory)/ado-oidc-token"
          printf '%s' "$idToken" > "$TOKEN_FILE"
          chmod 600 "$TOKEN_FILE"
          
          # Set environment variables for Azure Identity SDK
          echo "##vso[task.setvariable variable=AZURE_FEDERATED_TOKEN_FILE]$TOKEN_FILE"
          echo "##vso[task.setvariable variable=AZURE_CLIENT_ID]$servicePrincipalId"
          echo "##vso[task.setvariable variable=AZURE_TENANT_ID]$tenantId"
          
          echo "Azure credentials configured:"
          echo "Client ID: $servicePrincipalId"
          echo "Tenant ID: $tenantId"
          echo "Token file: $TOKEN_FILE"

    - script: |
        chmod +x $(PROJECT_ROOT_DIR)/ci/scripts/*.sh
        # Set environment variables for validation using the mapped variables
        export AZURE_OPENAI_ENDPOINT=$(azureOpenAIEndpoint)
        export AZURE_OPENAI_API_KEY=$(azureOpenAIApiKey)
        export AZURE_OPENAI_DEPLOYMENT=$(azureOpenAIDeployment)
        export AZURE_CLIENT_ID=$(AZURE_CLIENT_ID)
        export AZURE_TENANT_ID=$(AZURE_TENANT_ID)
        export AZURE_FEDERATED_TOKEN_FILE=$(AZURE_FEDERATED_TOKEN_FILE)
        ./$(PROJECT_ROOT_DIR)/ci/scripts/validate-samples.sh python "$(Pipeline.Workspace)/ChangedPython/changed_python.txt" $(VALIDATE_WITH_SERVICE)

      displayName: 'Validate Python samples'

    - script: |
        mkdir -p validation-results
        cp validation-*.log validation-results/ 2>/dev/null || echo "No validation log files found"
      displayName: 'Collect validation logs'
      condition: always()

    - publish: validation-results/
      artifact: PythonResults
      condition: always()

  - job: ValidateJava
    displayName: 'Validate Java Samples'
    dependsOn: 
    - DetectChanges
    - PublishConfigs
    - ConfigureCredentials
    condition: eq(dependencies.DetectChanges.outputs['detectChanges.hasJavaChanges'], 'true')
    variables:
      # Map the output variables from GenerateSamples job
      azureOpenAIEndpoint: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_ENDPOINT'] ]
      azureOpenAIApiKey: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_API_KEY'] ]
      azureOpenAIDeployment: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_DEPLOYMENT'] ]
      servicePrincipalId: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_CLIENT_ID'] ]
      tenantId: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_TENANT_ID'] ]
    steps:
    - checkout: self
    - task: JavaToolInstaller@0
      inputs:
        versionSpec: '17'
        jdkArchitectureOption: 'x64'
        jdkSourceOption: 'PreInstalled'

    - download: current
      artifact: ChangedJava
      displayName: 'Download list of changed Java samples'

    - download: current
      artifact: GeneratedSamples
      displayName: 'Download generated samples'

    - script: |
        mkdir -p $(PUBLISHED_SAMPLES_DIR)
        cp -r "$(Pipeline.Workspace)/GeneratedSamples/"* $(PUBLISHED_SAMPLES_DIR)/
        echo "Copied downloaded samples to $(PUBLISHED_SAMPLES_DIR)/"
      displayName: 'Copy sample artifacts to workspace'

    - download: current
      artifact: GeneratedConfigs
      displayName: 'Download generated configurations'

    - script: |
        cp -r "$(Pipeline.Workspace)/GeneratedConfigs/"* $(PUBLISHED_SAMPLES_DIR)/
      displayName: 'Copy generated configurations to workspace'

    - task: AzureCLI@2
      displayName: 'Set up Azure credentials for Java samples'
      inputs:
        azureSubscription: $(ARM_SERVICE_CONNECTION_NAME)
        addSpnToEnvironment: true
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Create token file for federated authentication
          TOKEN_FILE="$(Agent.TempDirectory)/ado-oidc-token"
          printf '%s' "$idToken" > "$TOKEN_FILE"
          chmod 600 "$TOKEN_FILE"
          
          # Set environment variables for Azure Identity SDK
          echo "##vso[task.setvariable variable=AZURE_FEDERATED_TOKEN_FILE]$TOKEN_FILE"
          echo "##vso[task.setvariable variable=AZURE_CLIENT_ID]$servicePrincipalId"
          echo "##vso[task.setvariable variable=AZURE_TENANT_ID]$tenantId"

    - script: |
        chmod +x $(PROJECT_ROOT_DIR)/ci/scripts/*.sh
        # Set environment variables for validation using the mapped variables
        export AZURE_OPENAI_ENDPOINT=$(azureOpenAIEndpoint)
        export AZURE_OPENAI_API_KEY=$(azureOpenAIApiKey)
        export AZURE_OPENAI_DEPLOYMENT=$(azureOpenAIDeployment)
        export AZURE_CLIENT_ID=$(AZURE_CLIENT_ID)
        export AZURE_TENANT_ID=$(AZURE_TENANT_ID)
        export AZURE_FEDERATED_TOKEN_FILE=$(AZURE_FEDERATED_TOKEN_FILE)
        ./$(PROJECT_ROOT_DIR)/ci/scripts/validate-samples.sh java "$(Pipeline.Workspace)/ChangedJava/changed_java.txt" $(VALIDATE_WITH_SERVICE)

      displayName: 'Validate Java samples'

    - script: |
        mkdir -p validation-results
        cp validation-*.log validation-results/ 2>/dev/null || echo "No validation log files found"
      displayName: 'Collect validation logs'
      condition: always()

    - publish: validation-results/
      artifact: JavaResults
      condition: always()
    
  - job: ValidateJavascript
    displayName: 'Validate Javascript Samples'
    dependsOn: 
    - DetectChanges
    - PublishConfigs
    - ConfigureCredentials
    condition: eq(dependencies.DetectChanges.outputs['detectChanges.hasJavascriptChanges'], 'true')
    variables:
      # Map the output variables from GenerateSamples job
      azureOpenAIEndpoint: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_ENDPOINT'] ]
      azureOpenAIApiKey: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_API_KEY'] ]
      azureOpenAIDeployment: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_DEPLOYMENT'] ]
      servicePrincipalId: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_CLIENT_ID'] ]
      tenantId: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_TENANT_ID'] ]
    steps:
    - checkout: self
    - task: NodeTool@0
      inputs:
        versionSource: 'spec'
        versionSpec: '20.3.1'

    - download: current
      artifact: ChangedJavascript
      displayName: 'Download list of changed Javascript samples'

    - download: current
      artifact: GeneratedSamples
      displayName: 'Download generated samples'

    - script: |
        mkdir -p $(PUBLISHED_SAMPLES_DIR)
        cp -r "$(Pipeline.Workspace)/GeneratedSamples/"* $(PUBLISHED_SAMPLES_DIR)/
        echo "Copied downloaded samples to $(PUBLISHED_SAMPLES_DIR)/"
      displayName: 'Copy sample artifacts to workspace'

    - download: current
      artifact: GeneratedConfigs
      displayName: 'Download generated configurations'

    - script: |
        cp -r "$(Pipeline.Workspace)/GeneratedConfigs/"* $(PUBLISHED_SAMPLES_DIR)/
      displayName: 'Copy generated configurations to workspace'

    - task: AzureCLI@2
      displayName: 'Set up Azure credentials for Javascript samples'
      inputs:
        azureSubscription: $(ARM_SERVICE_CONNECTION_NAME)
        addSpnToEnvironment: true
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Create token file for federated authentication
          TOKEN_FILE="$(Agent.TempDirectory)/ado-oidc-token"
          printf '%s' "$idToken" > "$TOKEN_FILE"
          chmod 600 "$TOKEN_FILE"
          
          # Set environment variables for Azure Identity SDK
          echo "##vso[task.setvariable variable=AZURE_FEDERATED_TOKEN_FILE]$TOKEN_FILE"
          echo "##vso[task.setvariable variable=AZURE_CLIENT_ID]$servicePrincipalId"
          echo "##vso[task.setvariable variable=AZURE_TENANT_ID]$tenantId"

    - script: |
        chmod +x $(PROJECT_ROOT_DIR)/ci/scripts/*.sh
        # Set environment variables for validation using the mapped variables
        export AZURE_OPENAI_ENDPOINT=$(azureOpenAIEndpoint)
        export AZURE_OPENAI_API_KEY=$(azureOpenAIApiKey)
        export AZURE_OPENAI_DEPLOYMENT=$(azureOpenAIDeployment)
        export AZURE_CLIENT_ID=$(AZURE_CLIENT_ID)
        export AZURE_TENANT_ID=$(AZURE_TENANT_ID)
        export AZURE_FEDERATED_TOKEN_FILE=$(AZURE_FEDERATED_TOKEN_FILE)
        ./$(PROJECT_ROOT_DIR)/ci/scripts/validate-samples.sh javascript "$(Pipeline.Workspace)/ChangedJavascript/changed_javascript.txt" $(VALIDATE_WITH_SERVICE)

      displayName: 'Validate Javascript samples'

    - script: |
        mkdir -p validation-results
        cp validation-*.log validation-results/ 2>/dev/null || echo "No validation log files found"
      displayName: 'Collect validation logs'
      condition: always()

    - publish: validation-results/
      artifact: JavascriptResults
      condition: always()

  - job: ValidateGo
    displayName: 'Validate Go Samples'
    dependsOn: 
    - DetectChanges
    - PublishConfigs
    - ConfigureCredentials
    condition: eq(dependencies.DetectChanges.outputs['detectChanges.hasGoChanges'], 'true')
    variables:
      # Map the output variables from GenerateSamples job
      azureOpenAIEndpoint: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_ENDPOINT'] ]
      azureOpenAIApiKey: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_API_KEY'] ]
      azureOpenAIDeployment: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_DEPLOYMENT'] ]
      servicePrincipalId: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_CLIENT_ID'] ]
      tenantId: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_TENANT_ID'] ]

    steps:
    - checkout: self
    - task: GoTool@0
      inputs:
        version: '1.25.3'

    - download: current
      artifact: ChangedGo
      displayName: 'Download list of changed Go samples'

    - download: current
      artifact: GeneratedSamples
      displayName: 'Download generated samples'

    - script: |
        mkdir -p $(PUBLISHED_SAMPLES_DIR)
        cp -r "$(Pipeline.Workspace)/GeneratedSamples/"* $(PUBLISHED_SAMPLES_DIR)/
        echo "Copied downloaded samples to $(PUBLISHED_SAMPLES_DIR)/"
      displayName: 'Copy sample artifacts to workspace'

    - download: current
      artifact: GeneratedConfigs
      displayName: 'Download generated configurations'

    - script: |
        cp -r "$(Pipeline.Workspace)/GeneratedConfigs/"* $(PUBLISHED_SAMPLES_DIR)/
      displayName: 'Copy generated configurations to workspace'

    - task: AzureCLI@2
      displayName: 'Set up Azure credentials for Go samples'
      inputs:
        azureSubscription: $(ARM_SERVICE_CONNECTION_NAME)
        addSpnToEnvironment: true
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Create token file for federated authentication
          TOKEN_FILE="$(Agent.TempDirectory)/ado-oidc-token"
          printf '%s' "$idToken" > "$TOKEN_FILE"
          chmod 600 "$TOKEN_FILE"
          
          # Set environment variables for Azure Identity SDK
          echo "##vso[task.setvariable variable=AZURE_FEDERATED_TOKEN_FILE]$TOKEN_FILE"
          echo "##vso[task.setvariable variable=AZURE_CLIENT_ID]$servicePrincipalId"
          echo "##vso[task.setvariable variable=AZURE_TENANT_ID]$tenantId"

    - script: |
        chmod +x $(PROJECT_ROOT_DIR)/ci/scripts/*.sh
        # Set environment variables for validation using the mapped variables
        export AZURE_OPENAI_ENDPOINT=$(azureOpenAIEndpoint)
        export AZURE_OPENAI_API_KEY=$(azureOpenAIApiKey)
        export AZURE_OPENAI_DEPLOYMENT=$(azureOpenAIDeployment)
        export AZURE_CLIENT_ID=$(AZURE_CLIENT_ID)
        export AZURE_TENANT_ID=$(AZURE_TENANT_ID)
        export AZURE_FEDERATED_TOKEN_FILE=$(AZURE_FEDERATED_TOKEN_FILE)
        ./$(PROJECT_ROOT_DIR)/ci/scripts/validate-samples.sh go "$(Pipeline.Workspace)/ChangedGo/changed_go.txt" $(VALIDATE_WITH_SERVICE)

      displayName: 'Validate Go samples'

    - script: |
        mkdir -p validation-results
        cp validation-*.log validation-results/ 2>/dev/null || echo "No validation log files found"
      displayName: 'Collect validation logs'
      condition: always()

    - publish: validation-results/
      artifact: GoResults
      condition: always()

  - job: ValidateCurl
    displayName: 'Validate Curl Samples'
    dependsOn: 
    - DetectChanges
    - PublishConfigs
    - ConfigureCredentials
    condition: eq(dependencies.DetectChanges.outputs['detectChanges.hasCurlChanges'], 'true')
    variables:
      # Map the output variables from ConfigureCredentials job
      azureOpenAIEndpoint: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_ENDPOINT'] ]
      azureOpenAIApiKey: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_API_KEY'] ]
      azureOpenAIDeployment: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_OPENAI_DEPLOYMENT'] ]
      servicePrincipalId: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_CLIENT_ID'] ]
      tenantId: $[ dependencies.ConfigureCredentials.outputs['configureCredentials.AZURE_TENANT_ID'] ]

    steps:
    - checkout: self

    - download: current
      artifact: ChangedCurl
      displayName: 'Download list of changed Curl samples'

    - download: current
      artifact: GeneratedSamples
      displayName: 'Download generated samples'

    - script: |
        mkdir -p $(PUBLISHED_SAMPLES_DIR)
        cp -r "$(Pipeline.Workspace)/GeneratedSamples/"* $(PUBLISHED_SAMPLES_DIR)/
        echo "Copied downloaded samples to $(PUBLISHED_SAMPLES_DIR)/"
      displayName: 'Copy sample artifacts to workspace'

    - download: current
      artifact: GeneratedConfigs
      displayName: 'Download generated configurations'

    - script: |
        cp -r "$(Pipeline.Workspace)/GeneratedConfigs/"* $(PUBLISHED_SAMPLES_DIR)/
      displayName: 'Copy generated configurations to workspace'

    - task: AzureCLI@2
      displayName: 'Set up Azure credentials for Curl samples'
      inputs:
        azureSubscription: $(ARM_SERVICE_CONNECTION_NAME)
        addSpnToEnvironment: true
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Create token file for federated authentication
          TOKEN_FILE="$(Agent.TempDirectory)/ado-oidc-token"
          printf '%s' "$idToken" > "$TOKEN_FILE"
          chmod 600 "$TOKEN_FILE"
          
          # Set environment variables for Azure Identity SDK
          echo "##vso[task.setvariable variable=AZURE_FEDERATED_TOKEN_FILE]$TOKEN_FILE"
          echo "##vso[task.setvariable variable=AZURE_CLIENT_ID]$servicePrincipalId"
          echo "##vso[task.setvariable variable=AZURE_TENANT_ID]$tenantId"

    - script: |
        chmod +x $(PROJECT_ROOT_DIR)/ci/scripts/*.sh
        # Set environment variables for validation using the mapped variables
        export AZURE_OPENAI_ENDPOINT=$(azureOpenAIEndpoint)
        export AZURE_OPENAI_API_KEY=$(azureOpenAIApiKey)
        export AZURE_OPENAI_DEPLOYMENT=$(azureOpenAIDeployment)
        export AZURE_CLIENT_ID=$(AZURE_CLIENT_ID)
        export AZURE_TENANT_ID=$(AZURE_TENANT_ID)
        export AZURE_FEDERATED_TOKEN_FILE=$(AZURE_FEDERATED_TOKEN_FILE)
        ./$(PROJECT_ROOT_DIR)/ci/scripts/validate-samples.sh curl "$(Pipeline.Workspace)/ChangedCurl/changed_curl.txt" $(VALIDATE_WITH_SERVICE)

      displayName: 'Validate Curl samples'

    - script: |
        mkdir -p validation-results
        cp validation-*.log validation-results/ 2>/dev/null || echo "No validation log files found"
      displayName: 'Collect validation logs'
      condition: always()

    - publish: validation-results/
      artifact: CurlResults
      condition: always()
  
  - job: OutputValidatedSamples
    displayName: 'Output Validated Samples'
    dependsOn: 
    - DetectChanges
    - ValidateCSharp
    - ValidatePython
    - ValidateJava
    - ValidateJavascript
    - ValidateGo
    - ValidateCurl
    condition: always()
    variables:
      hasCSharpChanges: $[ dependencies.DetectChanges.outputs['detectChanges.hasCSharpChanges'] ]
      hasPythonChanges: $[ dependencies.DetectChanges.outputs['detectChanges.hasPythonChanges'] ]
      hasJavaChanges: $[ dependencies.DetectChanges.outputs['detectChanges.hasJavaChanges'] ]
      hasJavascriptChanges: $[ dependencies.DetectChanges.outputs['detectChanges.hasJavascriptChanges'] ]
      hasGoChanges: $[ dependencies.DetectChanges.outputs['detectChanges.hasGoChanges'] ]
      hasCurlChanges: $[ dependencies.DetectChanges.outputs['detectChanges.hasCurlChanges'] ]
    steps:
    - download: current
      artifact: GeneratedSamples
      displayName: 'Download generated samples'

    - download: current
      artifact: CSharpResults
      displayName: 'Download C# validation results'
      condition: eq(variables['hasCSharpChanges'], 'true')

    - download: current
      artifact: PythonResults
      displayName: 'Download Python validation results'
      condition: eq(variables['hasPythonChanges'], 'true')

    - download: current
      artifact: JavaResults
      displayName: 'Download Java validation results'
      condition: eq(variables['hasJavaChanges'], 'true')

    - download: current
      artifact: JavascriptResults
      displayName: 'Download Javascript validation results'
      condition: eq(variables['hasJavascriptChanges'], 'true')

    - download: current
      artifact: GoResults
      displayName: 'Download Go validation results'
      condition: eq(variables['hasGoChanges'], 'true')

    - download: current
      artifact: CurlResults
      displayName: 'Download Curl validation results'
      condition: eq(variables['hasCurlChanges'], 'true')

    - script: |
        mkdir -p $(PUBLISHED_SAMPLES_DIR)
        cp -r "$(Pipeline.Workspace)/GeneratedSamples/"* $(PUBLISHED_SAMPLES_DIR)/
        echo "Copied downloaded samples to $(PUBLISHED_SAMPLES_DIR)/"
      displayName: 'Copy sample artifacts to workspace'
    
    - script: |
        chmod +x $(PROJECT_ROOT_DIR)/ci/scripts/remove-unvalidated-samples.sh
        ./$(PROJECT_ROOT_DIR)/ci/scripts/remove-unvalidated-samples.sh "$(Pipeline.Workspace)/CSharpResults/validation-errors.log"
        ./$(PROJECT_ROOT_DIR)/ci/scripts/remove-unvalidated-samples.sh "$(Pipeline.Workspace)/PythonResults/validation-errors.log"
        ./$(PROJECT_ROOT_DIR)/ci/scripts/remove-unvalidated-samples.sh "$(Pipeline.Workspace)/JavaResults/validation-errors.log"
        ./$(PROJECT_ROOT_DIR)/ci/scripts/remove-unvalidated-samples.sh "$(Pipeline.Workspace)/JavascriptResults/validation-errors.log"
        ./$(PROJECT_ROOT_DIR)/ci/scripts/remove-unvalidated-samples.sh "$(Pipeline.Workspace)/GoResults/validation-errors.log"
        ./$(PROJECT_ROOT_DIR)/ci/scripts/remove-unvalidated-samples.sh "$(Pipeline.Workspace)/CurlResults/validation-errors.log"
      displayName: 'Remove unvalidated samples'

    - publish: $(PUBLISHED_SAMPLES_DIR)/
      artifact: ValidatedSamples
      displayName: 'Publish validated samples'
      condition: always()

- stage: PublishSamples
  displayName: 'Publish Validated Samples'
  dependsOn: ValidateSamples
  condition: eq(variables['runPublishSamples'], 'true')
  variables:
    - name: major
      value: 1
    - name: minor
      value: 0
    # To advance the patch counter, update the format string value (used as the counter key) and adjust the seed below
    - name: patchVersionCounterKey
      value: '{0}.{1}.45'
    - name: patch
      value: $[counter(format(variables['patchVersionCounterKey'], variables['major'], variables['minor']), 45)]
  jobs:
  - job: PublishSampleLibrary
    displayName: 'Publish Sample Library npm package'
    condition: eq(variables['publishSampleLibrary'], 'true')
    steps:
    - checkout: self
    - task: NodeTool@0
      displayName: 'Install Node.js'
      inputs:
        versionSpec: '18.x'
    
    - download: current
      artifact: ValidatedSamples
      displayName: 'Download validated samples'

    - script: |
        mkdir -p $(PUBLISHED_SAMPLES_DIR)
        cp -r "$(Pipeline.Workspace)/ValidatedSamples/"* $(PUBLISHED_SAMPLES_DIR)/
        echo "Copied downloaded samples to $(PUBLISHED_SAMPLES_DIR)/"
      displayName: 'Copy sample artifacts to workspace'

    - script: |
        # Copy generated samples into the npm package
        mkdir -p $(PROJECT_ROOT_DIR)/ci/packages/sdk-samples-api/samples
        cp -r $(PUBLISHED_SAMPLES_DIR)/* $(PROJECT_ROOT_DIR)/ci/packages/sdk-samples-api/samples/
        echo "Copied samples into npm package directory"
      displayName: 'Include samples in package'

    - script: |
        cd $(PROJECT_ROOT_DIR)/ci/packages/sdk-samples-api
        
        # Compose a version string using the base version and the build ID
        NEW_VERSION=$(major).$(minor).$(patch)
        echo "Setting version to $NEW_VERSION"
        npm version --no-git-tag-version $NEW_VERSION
      displayName: 'Generate unique package version'

    - script: |
        cd $(PROJECT_ROOT_DIR)/ci/packages/sdk-samples-api
        npm install
        npm run build
      displayName: 'Build sample library package'

    - task: Npm@1
      displayName: 'Publish @azure-foundry/sample-library to Azure Artifacts'
      inputs:
        command: 'publish'
        workingDir: './$(PROJECT_ROOT_DIR)/ci/packages/sdk-samples-api'
        publishRegistry: 'useFeed'
        publishFeed: '$(Project)/$(samples-feed)'
  - job: publishGithubSamples
    displayName: 'Publish Validated Samples to GitHub'
    condition: eq(variables['publishToGitHub'], 'true')
    steps:
    - checkout: self
      persistCredentials: true

    - download: current
      artifact: ValidatedSamples
      displayName: 'Download validated samples'

    - script: |
        mkdir -p $(PUBLISHED_SAMPLES_DIR)
        cp -r "$(Pipeline.Workspace)/ValidatedSamples/"* $(PUBLISHED_SAMPLES_DIR)/
        echo "Copied downloaded samples to $(PUBLISHED_SAMPLES_DIR)/"
      displayName: 'Copy sample artifacts to workspace'

    - script: |
        git config user.name "Azure Pipelines"
        git config user.email "azure-pipelines@example.com"
        git checkout -b ci/publish-samples-$(Build.BuildId)
        git add $(PUBLISHED_SAMPLES_DIR)/
        
        # Check if there are any staged changes
        if git diff --staged --quiet; then
          echo "No changes to commit - samples are already up to date"
          exit 0
        fi
        
        git commit -m "Publish validated samples from build $(Build.BuildId)"
        git push origin ci/publish-samples-$(Build.BuildId)
      displayName: 'Commit and push validated samples'


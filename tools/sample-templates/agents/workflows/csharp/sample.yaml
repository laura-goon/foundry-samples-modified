template: sample.cs.template
type: csharp
dependencies:
  - name: OpenAI
    version: 2.8.0
  - name: Azure.Identity
    version: 1.17.1
  - name: Azure.AI.Projects 
    version: 1.2.*-*
  - name: Azure.AI.Projects.OpenAI 
    version: 1.0.*-*
input:
  - name: projectEndpoint
    type: string
    required: false
    description: "Endpoint URL for the Azure AI service"
  - name: agentName
    type: string
    required: false
    description: "Name of the agent to use"
  - name: agentVersion
    type: string
    required: true
    description: "Version of the agent to use"
  - name: userMessage
    type: string
    required: false
    description: "Message to send to the agent"
  - name: useTokenCredentials
    type: boolean
    default: true
    description: "Use token credentials for authentication"
  - name: useEnvVars
    type: boolean
    required: false
    default: false
    description: "Use environment variables for configuration"
  - name: deploymentName
    type: string
    required: false
    description: "Deployment to use"
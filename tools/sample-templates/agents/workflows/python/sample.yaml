template: sample.py.template
type: python
dependencies:
  - name: openai
    version: 2.8.0
  - name: azure-identity
    version: 1.25.0
  - name: azure-ai-projects
    version: 2.0.0b1
input:
  - name: endpoint
    type: string
    required: false
    description: "Endpoint URL for the Azure AI service"
  - name: agentName
    type: string
    default: "MyAgent"
    required: false
    description: "Name of the agent to use"
  - name: agentVersion
    type: string
    default: "X.Y.Z"
    required: false
    description: "Version of the agent to use"
  - name: userMessage
    type: string
    required: false
    default: "Hello, how can you assist me today?"
    description: "Message to send to the agent"
  - name: useEnvVars
    type: boolean
    required: false
    default: false
    description: "Use environment variables for configuration"
  - name: useTokenCredentials
    type: boolean
    default: true
    description: "Use token credentials for authentication"
  - name: showDocsReferenceSections
    type: boolean
    required: false
    default: false
    description: "Show documentation reference links in the generated code snippets"
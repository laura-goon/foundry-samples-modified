template: sample.cs.template
type: csharp
dependencies:
  - name: OpenAI
    version: 2.8.0
  - name: Azure.Identity
    version: 1.17.1
  - name: Azure.AI.Projects 
    version: 1.2.*-*
  - name: Azure.AI.Projects.OpenAI 
    version: 1.0.*-*
input:
  - name: useTokenCredentials
    type: boolean
    default: true
    description: "Use token credentials for authentication"
  - name: agentName
    type: string
    required: true
    description: "Name of the agent to retrieve"
  - name: projectEndpoint
    type: string
    required: true
    description: "Endpoint URL for the Azure AI Projects API"
  - name: modelDeploymentName
    type: string
    required: true
    description: "Model to use for chat completion"
  - name: useEnvVars
    type: boolean
    required: false
    default: false
    description: "Use environment variables for configuration"
  - name: showOpenAIResponse
    type: boolean
    default: false
    required: true
    description: "Flag to indicate whether to show OpenAI response"
  - name: useAsync
    type: boolean
    default: false
    description: "Flag to indicate synchronous or asynchronous agent creation"
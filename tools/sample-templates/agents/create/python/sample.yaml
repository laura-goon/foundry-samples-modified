template: sample.py.template
type: python
dependencies:
  - name: openai
    version: 2.8.0
  - name: azure-identity
    version: 1.25.0
  - name: azure-ai-projects
    version: 2.0.0b1
input:
  - name: endpoint
    type: string
    required: true
    description: "Endpoint URL for the Azure AI service"
  - name: apiVersion
    type: string
    required: false
    description: "API version to use for the Azure AI Projects client"
  - name: agentID
    type: string
    required: false
    description: "ID of the agent to use"
  - name: agentName
    type: string
    required: true
    description: "Name of the agent to use"
  - name: modelDeploymentName
    type: string
    required: true
    description: "Model deployment name to use for the agent"
  - name: userMessage
    type: string
    required: false
    description: "Message to send to the agent"
  - name: useEnvVars
    type: boolean
    required: false
    default: false
    description: "Use environment variables for configuration"
  - name: useTokenCredentials
    type: boolean
    default: true
    description: "Use token credentials for authentication"
  - name: createAgentVersion
    type: boolean
    default: false
    description: "Flag to indicate agent creation with or without version"
  - name: showOpenAIResponse
    type: boolean
    default: false
    required: true
    description: "Flag to indicate whether to show Responses using OpenAI"
template: sample.js.template
type: javascript
dependencies:
  - name: "@azure/identity"
    version: 4.13.0
  - name: "@azure/ai-projects"
    version: 2.0.0-beta.1
input:
  - name: endpoint
    type: string
    required: true
    description: "Endpoint URL for the Microsoft Foundry project"
  - name: agentName
    type: string
    required: true
    description: "Name of the agent to retrieve"
  - name: agentVersion
    type: string
    required: false
    description: "Version of the agent to retrieve"
  - name: useEnvVars
    type: boolean
    required: false
    default: false
    description: "Use environment variables for configuration"
  - name: showOpenAIResponse
    type: boolean
    default: false
    required: true
    description: "Flag to indicate whether to show OpenAI response"